# Compartment layout for PMEG_Draft_Biomass_Prod (Christoph model)
# Compartments in model: c  e  m  px  n  er  ga  lv

[layout]
exchange_key      = "e"
import_prefixes   = ["R_EX_", "R_Henninger_"]
export_prefixes   = ["R_EX_", "R_Henninger_"]
biomass_prefixes  = ["R_Growth"]

# ── Compartments ────────────────────────────────────────────────────────────
# region = [x_min, x_max, y_min, y_max]
#
#   [ e  extracellular / exchange — bottom strip                        ]
#   [ ga Golgi ]  [ c  cytosol (large, central)  ] [ n  nucleus        ]
#                 [ lv vacuole ] [ er ER ]          [ px peroxisome     ]
#                                [ m  mitochondria ]

[compartment.c]
label  = "Cytosol"
region = [-4.0, 4.0, -2.0, 6.0]
color  = "#2471a3"
fill   = "rgba(36,113,163,0.06)"

[compartment.m]
label  = "Mitochondria"
region = [4.5, 9.0, -2.0, 3.0]
color  = "#ca6f1e"
fill   = "rgba(202,111,30,0.06)"

[compartment.px]
label  = "Peroxisome"
region = [9.5, 13.0, -2.0, 6.0]
color  = "#7d3c98"
fill   = "rgba(125,60,152,0.06)"

[compartment.n]
label  = "Nucleus"
region = [4.5, 9.0, 3.5, 6.0]
color  = "#1a5276"
fill   = "rgba(26,82,118,0.06)"

[compartment.er]
label  = "Endoplasmic Reticulum"
region = [-4.0, 4.0, 6.5, 10.0]
color  = "#943126"
fill   = "rgba(148,49,38,0.06)"

[compartment.ga]
label  = "Golgi"
region = [-12.0, -4.5, 6.5, 10.0]
color  = "#b7950b"
fill   = "rgba(183,149,11,0.06)"

[compartment.lv]
label  = "Vacuole"
region = [-4.0, 4.0, -6.0, -2.5]
color  = "#117a65"
fill   = "rgba(17,122,101,0.06)"

[compartment.e]
label  = "Extracellular / Exchange"
region = [-12.0, 13.0, -10.0, -6.5]
color  = "#566573"
fill   = "rgba(86,101,115,0.06)"

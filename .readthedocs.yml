version: 2

sphinx:
  configuration: docs/source/conf.py

build:
  os: "ubuntu-22.04"
  tools:
    python: "miniforge3-25.11"
    nodejs: "24"
  jobs:
      pre_create_environment:
        - npm install --global yarn
        - yarn install
        - yarn run vite build

conda:
  environment: environment.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - escher
